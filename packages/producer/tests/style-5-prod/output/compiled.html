</script>
    <style>body,
      html {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        background-color: #0a0a0a;
        overflow: hidden;
        font-family: "Courier New", Courier, monospace;
      }

      #master-composition {
        position: relative;
        width: 1920px;
        height: 1080px;
      }

      #aroll-video {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1920px;
        height: 1080px;
        border-radius: 4px;
        object-fit: cover;
        clip-path: inset(0 100% 0 0); /* For left-to-right wipe */
      }

[data-composition-id="grid-bg"] .bg-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        background-color: #0a0a0a;
        overflow: hidden;
      }

      [data-composition-id="grid-bg"] .grid-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        /* 40px grid pattern using linear-gradients */
        background-image:
          linear-gradient(to right, rgba(138, 138, 138, 0.1) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(138, 138, 138, 0.1) 1px, transparent 1px);
        background-size: 40px 40px;
        transform-origin: center center;
      }

      [data-composition-id="grid-bg"] .scan-line {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background-color: #33ff66;
        opacity: 0.2;
        box-shadow: 0 0 10px 1px rgba(51, 255, 102, 0.3);
        transform: translateY(-10px);
      }
    


      

      [data-composition-id="intro-seq"] {
        background-color: #0a0a0a;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Space Mono", monospace;
        width: 100%;
        height: 100%;
        color: #33ff66;
      }

      [data-composition-id="intro-seq"] .terminal-container {
        display: flex;
        flex-direction: column;
        gap: 30px;
        width: 80%;
        max-width: 1200px;
      }

      [data-composition-id="intro-seq"] .terminal-line {
        font-size: 72px;
        font-weight: 700;
        text-transform: uppercase;
        min-height: 1.2em;
        white-space: pre;
        text-shadow:
          0 0 10px rgba(51, 255, 102, 0.6),
          0 0 20px rgba(51, 255, 102, 0.2);
        display: flex;
